syntax = "proto3";

package api.admin.server.v1;

import "google/api/annotations.proto";

option go_package = "github.com/npanel-dev/NPanel-backend/api/admin/server/v1;v1";
option java_multiple_files = true;
option java_package = "api.admin.server.v1";

service ServerService {
  // Server Management
  rpc CreateServer (CreateServerRequest) returns (CreateServerReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/create"
      body: "*"
    };
  }

  rpc UpdateServer (UpdateServerRequest) returns (UpdateServerReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/update"
      body: "*"
    };
  }

  rpc DeleteServer (DeleteServerRequest) returns (DeleteServerReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/delete"
      body: "*"
    };
  }

  rpc FilterServerList (FilterServerListRequest) returns (FilterServerListReply) {
    option (google.api.http) = {
      get: "/v1/admin/server/list"
    };
  }

  rpc GetServerProtocols (GetServerProtocolsRequest) returns (GetServerProtocolsReply) {
    option (google.api.http) = {
      get: "/v1/admin/server/protocols"
    };
  }

  // Node Management
  rpc CreateNode (CreateNodeRequest) returns (CreateNodeReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/node/create"
      body: "*"
    };
  }

  rpc UpdateNode (UpdateNodeRequest) returns (UpdateNodeReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/node/update"
      body: "*"
    };
  }

  rpc DeleteNode (DeleteNodeRequest) returns (DeleteNodeReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/node/delete"
      body: "*"
    };
  }

  rpc FilterNodeList (FilterNodeListRequest) returns (FilterNodeListReply) {
    option (google.api.http) = {
      get: "/v1/admin/server/node/list"
    };
  }

  rpc ToggleNodeStatus (ToggleNodeStatusRequest) returns (ToggleNodeStatusReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/node/status/toggle"
      body: "*"
    };
  }

  rpc QueryNodeTag (QueryNodeTagRequest) returns (QueryNodeTagReply) {
    option (google.api.http) = {
      get: "/v1/admin/server/node/tags"
    };
  }

  // Migration
  rpc HasMigrateServerNode (HasMigrateServerNodeRequest) returns (HasMigrateServerNodeReply) {
    option (google.api.http) = {
      get: "/v1/admin/server/migrate/has"
    };
  }

  rpc MigrateServerNode (MigrateServerNodeRequest) returns (MigrateServerNodeReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/migrate/run"
      body: "*"
    };
  }

  // Sort
  rpc ResetSortWithServer (ResetSortRequest) returns (ResetSortReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/server/sort"
      body: "*"
    };
  }

  rpc ResetSortWithNode (ResetSortRequest) returns (ResetSortReply) {
    option (google.api.http) = {
      post: "/v1/admin/server/node/sort"
      body: "*"
    };
  }
}

// Protocol represents a server protocol configuration with all fields
message Protocol {
  string type = 1;
  int32 port = 2;
  bool enable = 3;
  string security = 4;
  string sni = 5;
  bool allow_insecure = 6;
  string fingerprint = 7;
  string reality_server_addr = 8;
  int32 reality_server_port = 9;
  string reality_private_key = 10;
  string reality_public_key = 11;
  string reality_short_id = 12;
  string transport = 13;
  string host = 14;
  string path = 15;
  string service_name = 16;
  string cipher = 17;
  string server_key = 18;
  string flow = 19;
  string hop_ports = 20;
  int32 hop_interval = 21;
  string obfs_password = 22;
  bool disable_sni = 23;
  bool reduce_rtt = 24;
  string udp_relay_mode = 25;
  string congestion_controller = 26;
  string multiplex = 27;
  string padding_scheme = 28;
  int32 up_mbps = 29;
  int32 down_mbps = 30;
  string obfs = 31;
  string obfs_host = 32;
  string obfs_path = 33;
  string xhttp_mode = 34;
  string xhttp_extra = 35;
  string encryption = 36;
  string encryption_mode = 37;
  string encryption_rtt = 38;
  string encryption_ticket = 39;
  string encryption_server_padding = 40;
  string encryption_private_key = 41;
  string encryption_client_padding = 42;
  string encryption_password = 43;
  double ratio = 44;
  string cert_mode = 45;
  string cert_dns_provider = 46;
  string cert_dns_env = 47;
  string simnet_psk = 48;
  int32 simnet_key_id = 49;
  string simnet_ticket_id = 50;
  string simnet_path = 51;
  string simnet_carrier = 52;
  bool simnet_af_enabled = 53;
  string simnet_af_path_mode = 54;
  string simnet_af_path_prefix = 55;
  string simnet_af_path_suffix = 56;
  string simnet_af_magic_mode = 57;
  int32 simnet_af_response_jitter_ms = 58;
  bool simnet_af_handshake_polymorphism = 59;
  bool simnet_af_settings_jitter = 60;
  bool simnet_af_fake_header_injection = 61;
  bool simnet_reverse_enabled = 62;
  string simnet_reverse_listen_addr = 63;
  int32 simnet_reverse_listen_port = 64;
  string simnet_reverse_target_host = 65;
  int32 simnet_reverse_target_port = 66;
  bool simnet_fallback_enabled = 67;
  string simnet_fallback_target_scheme = 68;
  string simnet_fallback_target_host = 69;
  int32 simnet_fallback_target_port = 70;
  string simnet_fallback_host_header = 71;
  string simnet_fallback_tls_sni = 72;
  int32 simnet_inbound_max_streams_per_session = 121;
  int32 simnet_inbound_max_handler_tasks_per_session = 122;
  int32 simnet_stream_event_channel_capacity = 123;
  int32 simnet_stream_data_channel_capacity = 124;
  int32 simnet_target_dial_timeout_ms = 125;
  int32 simnet_target_max_concurrent_dials = 126;
  bool simnet_egress_block_loopback = 127;
  bool simnet_egress_block_private = 128;
  bool simnet_egress_block_link_local = 129;
  bool simnet_egress_block_metadata = 130;
  int32 simnet_send_window = 131;
  int32 simnet_recv_window = 132;
  int32 simnet_max_concurrent_streams = 133;
  int32 simnet_initial_window_size = 134;
  int32 simnet_max_frame_size = 135;
  int32 simnet_client_max_concurrent_streams = 136;
  int32 simnet_client_max_streams_per_session = 137;
  int32 simnet_client_session_idle_timeout_secs = 138;
  int32 simnet_inbound_max_udp_streams_per_session = 139;
  int32 simnet_client_max_udp_sessions = 140;

  // OmniFlow 基础配置
  string omniflow_carrier = 73;                    // h2 或 h3
  string omniflow_path = 74;                       // HTTP 路径
  string omniflow_content_type = 75;               // Content-Type
  string omniflow_profile_path = 76;               // Profile 文件路径
  string omniflow_profile_json = 77;               // Profile JSON
  string omniflow_server_host = 78;                // 服务器主机
  int32 omniflow_server_port = 79;                 // 服务器端口
  string omniflow_ca_cert_path = 80;               // CA 证书路径
  string omniflow_target_meta = 81;                // 加密目标元数据
  string omniflow_spki_pin = 82;                   // SPKI Pin

  // OmniFlow H3 Fallback
  bool omniflow_h3_fallback_enabled = 83;
  string omniflow_h3_fallback_policy = 84;         // always/timeout/never
  int32 omniflow_h3_fallback_timeout_ms = 85;
  int32 omniflow_h3_fallback_retry_budget = 86;
  bool omniflow_h3_fallback_smoke_enabled = 87;
  int32 omniflow_h3_fallback_smoke_interval_sec = 88;
  int32 omniflow_h3_fallback_smoke_timeout_ms = 89;

  // OmniFlow 连接管理
  int32 omniflow_max_age_sec = 90;
  int32 omniflow_idle_timeout_sec = 91;
  int32 omniflow_max_connections = 92;

  // OmniFlow 抗指纹
  bool omniflow_adaptive_tls_enabled = 93;
  string omniflow_tls_fingerprint = 94;            // chrome/firefox/safari
  string omniflow_sni_mode = 95;                   // direct/transparent_forward
  string omniflow_padding_mode = 96;               // random/mtu_align/fixed_overhead
  bool omniflow_traffic_shaping_enabled = 97;

  bool omniflow_af_enabled = 101;                  // 启用随机 AF path
  string omniflow_af_path_mode = 102;              // api/random
  string omniflow_af_path_prefix = 103;            // 随机 path 前缀
  string omniflow_af_path_suffix = 104;            // 随机 path 后缀
  int32 omniflow_af_path_rotation_secs = 105;      // path 轮转秒数
  int32 omniflow_af_path_skew_slots = 106;         // 允许偏移 slot 数

  // OmniFlow 同端口浏览器 Fallback 反向代理
  bool omniflow_fallback_enabled = 107;
  string omniflow_fallback_target_scheme = 108;    // https/http
  string omniflow_fallback_target_host = 109;      // 目标网站 host
  int32 omniflow_fallback_target_port = 110;       // 目标网站端口
  string omniflow_fallback_host_header = 111;      // 上游 Host header
  string omniflow_fallback_tls_sni = 112;          // 上游 TLS SNI

  // OmniFlow 回退 Carrier
  bool omniflow_fallback_carrier_enabled = 98;
  bool omniflow_fallback_connect_tunnel = 99;
  bool omniflow_fallback_wss_enabled = 100;

  string mc1_mode = 113;
  repeated string mc1_cidr_segments = 114;
  string mundo_username = 115;
  string mundo_certificate_fingerprint = 116;
  string mundo_fake_title = 117;
  string mundo_fake_message = 118;
  bool mundo_accept_proxy_protocol = 119;
  bool mundo_use_tls_certificate = 120;
}

message SortItem {
  int64 id = 1;
  int32 sort = 2;
}

message ServerOnlineIP {
  string ip = 1;
  string protocol = 2;
}

message ServerOnlineUser {
  repeated ServerOnlineIP ip = 1;
  int64 user_id = 2;
  string subscribe = 3;
  int64 subscribe_id = 4;
  int64 traffic = 5;
  int64 expired_at = 6;
}

message ServerStatus {
  double cpu = 1;
  double mem = 2;
  double disk = 3;
  string protocol = 4;
  repeated ServerOnlineUser online = 5;
  string status = 6;
}

message Server {
  int64 id = 1;
  string name = 3;
  string country = 4;
  string city = 5;
  string address = 6;
  int32 sort = 7;
  repeated Protocol protocols = 8;
  int64 last_reported_at = 9;
  ServerStatus status = 10;
  int64 created_at = 11;
  int64 updated_at = 12;
}

message Node {
  int64 id = 1;
  string name = 3;
  repeated string tags = 4;
  uint32 port = 5;  // Proto3 不支持 uint16，使用 uint32（值范围 0-65535，对应数据库 smallint32unsigned）
  string address = 6;
  int64 server_id = 7;
  string protocol = 8;
  optional bool enabled = 9;  // 使用 optional 支持 null 和布尔值，与老项目兼容
  int32 sort = 10;
  int64 node_group_id = 11;
  repeated int64 node_group_ids = 12;
  string node_type = 13;
  optional bool is_hidden = 14;
  int64 created_at = 15;
  int64 updated_at = 16;
}

// Server Requests/Replies
message CreateServerRequest {
  string name = 1;
  string country = 2;
  string city = 3;
  string address = 4;
  int32 sort = 5;
  repeated Protocol protocols = 6;
}

message CreateServerData {
  Server server = 1;
}

message CreateServerReply {
  int32 code = 1;          // 状态码
  string message = 2;      // 消息内容
  CreateServerData data = 3; // 响应数据
}

message UpdateServerRequest {
  int64 id = 1;
  string name = 2;
  string country = 3;
  string city = 4;
  string address = 5;
  int32 sort = 6;
  repeated Protocol protocols = 7;
}

message UpdateServerData {
  Server server = 1;
}

message UpdateServerReply {
  int32 code = 1;          // 状态码
  string message = 2;      // 消息内容
  UpdateServerData data = 3; // 响应数据
}

message DeleteServerRequest {
  int64 id = 1;
}

message DeleteServerData {
  bool success = 1;
}

message DeleteServerReply {
  int32 code = 1;          // 状态码
  string message = 2;      // 消息内容
  DeleteServerData data = 3; // 响应数据
}

message FilterServerListRequest {
  int32 page = 1;
  int32 size = 2;
  string search = 3;
}

message FilterServerListData {
  int32 total = 1;
  repeated Server list = 2;
}

message FilterServerListReply {
  int32 code = 1;              // 状态码
  string message = 2;          // 消息内容
  FilterServerListData data = 3; // 响应数据
}

message GetServerProtocolsRequest {
  int64 id = 1;
}

message GetServerProtocolsData {
  repeated Protocol protocols = 1;
}

message GetServerProtocolsReply {
  int32 code = 1;                // 状态码
  string message = 2;            // 消息内容
  GetServerProtocolsData data = 3; // 响应数据
}

// Node Requests/Replies
message CreateNodeRequest {
  string name = 1;
  repeated string tags = 2;
  uint32 port = 3;  // Proto3 不支持 uint16，使用 uint32（值范围 0-65535）
  string address = 4;
  int64 server_id = 5;
  string protocol = 6;
  optional bool enabled = 7;  // 使用 optional 支持 null 和布尔值，与老项目兼容
  string node_type = 8;
  optional bool is_hidden = 9;
  repeated int64 node_group_ids = 10;
}

message CreateNodeData {
  Node node = 1;
}

message CreateNodeReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  CreateNodeData data = 3; // 响应数据
}

message UpdateNodeRequest {
  int64 id = 1;
  string name = 2;
  repeated string tags = 3;
  uint32 port = 4;  // Proto3 不支持 uint16，使用 uint32（值范围 0-65535）
  string address = 5;
  int64 server_id = 6;
  string protocol = 7;
  optional bool enabled = 8;  // 使用 optional 支持 null 和布尔值，与老项目兼容
  string node_type = 9;
  optional bool is_hidden = 10;
  repeated int64 node_group_ids = 11;
}

message UpdateNodeData {
  Node node = 1;
}

message UpdateNodeReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  UpdateNodeData data = 3; // 响应数据
}

message DeleteNodeRequest {
  int64 id = 1;
}

message DeleteNodeData {
  bool success = 1;
}

message DeleteNodeReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  DeleteNodeData data = 3; // 响应数据
}

message FilterNodeListRequest {
  int32 page = 1;
  int32 size = 2;
  string search = 3;
  optional int64 node_group_id = 4;
}

message FilterNodeListData {
  int32 total = 1;
  repeated Node list = 2;
}

message FilterNodeListReply {
  int32 code = 1;            // 状态码
  string message = 2;        // 消息内容
  FilterNodeListData data = 3; // 响应数据
}

message ToggleNodeStatusRequest {
  int64 id = 1;
  optional bool enable = 2;  // 使用 optional 支持 null 和布尔值，与老项目兼容
}

message ToggleNodeStatusData {
  Node node = 1;
}

message ToggleNodeStatusReply {
  int32 code = 1;              // 状态码
  string message = 2;          // 消息内容
  ToggleNodeStatusData data = 3; // 响应数据
}

message QueryNodeTagRequest {
}

message QueryNodeTagData {
  repeated string tags = 1;
}

message QueryNodeTagReply {
  int32 code = 1;          // 状态码
  string message = 2;      // 消息内容
  QueryNodeTagData data = 3; // 响应数据
}

// Migration Requests/Replies
message HasMigrateServerNodeRequest {
}

message HasMigrateServerNodeData {
  bool has_migrate = 1;
}

message HasMigrateServerNodeReply {
  int32 code = 1;                  // 状态码
  string message = 2;              // 消息内容
  HasMigrateServerNodeData data = 3; // 响应数据
}

message MigrateServerNodeRequest {
}

message MigrateServerNodeData {
  uint64 success = 1;
  uint64 fail = 2;
}

message MigrateServerNodeReply {
  int32 code = 1;                 // 状态码
  string message = 2;             // 消息内容
  MigrateServerNodeData data = 3; // 响应数据
}

// Sort Requests/Replies
message ResetSortRequest {
  repeated SortItem sort = 1;
}

message ResetSortData {
  bool success = 1;
}

message ResetSortReply {
  int32 code = 1;        // 状态码
  string message = 2;    // 消息内容
  ResetSortData data = 3; // 响应数据
}
