}

// UpdateSubscribeGroupRequest 更新订阅组请求
message UpdateSubscribeGroupRequest {
  int64 id = 1;                       // 订阅组ID
  string name = 2;                    // 订阅组名称
  string description = 3;             // 订阅组描述
  bool is_expired_group = 4;          // 是否为过期组
  int64 expired_days_limit = 5;       // 过期天数限制
  int64 max_traffic_gb_expired = 6;   // 过期后最大流量GB
  int32 speed_limit = 7;              // 速度限制
}

// UpdateSubscribeGroupData 更新订阅组数据
message UpdateSubscribeGroupData {
  bool success = 1;
}

// UpdateSubscribeGroupReply 更新订阅组响应
message UpdateSubscribeGroupReply {
  int32 code = 1;                     // 状态码
  string message = 2;                 // 消息内容
  UpdateSubscribeGroupData data = 3;  // 响应数据
}

// DeleteSubscribeGroupRequest 删除订阅组请求
message DeleteSubscribeGroupRequest {
  int64 id = 1;  // 订阅组ID
}

// DeleteSubscribeGroupData 删除订阅组数据
message DeleteSubscribeGroupData {
  bool success = 1;
}

// DeleteSubscribeGroupReply 删除订阅组响应
message DeleteSubscribeGroupReply {
  int32 code = 1;                     // 状态码
  string message = 2;                 // 消息内容
  DeleteSubscribeGroupData data = 3;  // 响应数据
}

// BatchDeleteSubscribeGroupRequest 批量删除订阅组请求
message BatchDeleteSubscribeGroupRequest {
  repeated int64 ids = 1;  // 订阅组ID列表
}

// BatchDeleteSubscribeGroupData 批量删除订阅组数据
message BatchDeleteSubscribeGroupData {
  bool success = 1;
}

// BatchDeleteSubscribeGroupReply 批量删除订阅组响应
message BatchDeleteSubscribeGroupReply {
  int32 code = 1;                           // 状态码
  string message = 2;                       // 消息内容
  BatchDeleteSubscribeGroupData data = 3;   // 响应数据
}

// GetSubscribeGroupListRequest 获取订阅组列表请求
message GetSubscribeGroupListRequest {}

// GetSubscribeGroupListData 获取订阅组列表数据
message GetSubscribeGroupListData {
  repeated SubscribeGroupInfo list = 1;  // 订阅组列表
  int32 total = 2;                        // 总数
}

// GetSubscribeGroupListReply 获取订阅组列表响应
message GetSubscribeGroupListReply {
  int32 code = 1;                        // 状态码
  string message = 2;                    // 消息内容
  GetSubscribeGroupListData data = 3;    // 响应数据
}

// ResetAllSubscribeTokenRequest 重置所有订阅Token请求
message ResetAllSubscribeTokenRequest {}

// ResetAllSubscribeTokenData 重置所有订阅Token数据
message ResetAllSubscribeTokenData {
  bool success = 1;
}

// ResetAllSubscribeTokenReply 重置所有订阅Token响应
message ResetAllSubscribeTokenReply {
  int32 code = 1;                              // 状态码
  string message = 2;                          // 消息内容
  ResetAllSubscribeTokenData data = 3;         // 响应数据
}
