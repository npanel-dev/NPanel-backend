syntax = "proto3";

package api.admin.subscribe.v1;

import "google/api/annotations.proto";

option go_package = "github.com/omnsaas/services/kratos-service/api/admin/subscribe/v1;v1";
option java_multiple_files = true;
option java_package = "api.admin.subscribe.v1";

service Subscribe {
  // CreateSubscribe 创建订阅套餐
  rpc CreateSubscribe (CreateSubscribeRequest) returns (CreateSubscribeReply) {
    option (google.api.http) = {
      post: "/v1/admin/subscribe"
      body: "*"
    };
  }

  // UpdateSubscribe 更新订阅套餐
  rpc UpdateSubscribe (UpdateSubscribeRequest) returns (UpdateSubscribeReply) {
    option (google.api.http) = {
      put: "/v1/admin/subscribe"
      body: "*"
    };
  }

  // DeleteSubscribe 删除订阅套餐
  rpc DeleteSubscribe (DeleteSubscribeRequest) returns (DeleteSubscribeReply) {
    option (google.api.http) = {
      delete: "/v1/admin/subscribe"
      body: "*"
    };
  }

  // BatchDeleteSubscribe 批量删除订阅套餐
  rpc BatchDeleteSubscribe (BatchDeleteSubscribeRequest) returns (BatchDeleteSubscribeReply) {
    option (google.api.http) = {
      delete: "/v1/admin/subscribe/batch"
      body: "*"
    };
  }

  // GetSubscribeDetails 获取订阅套餐详情
  rpc GetSubscribeDetails (GetSubscribeDetailsRequest) returns (GetSubscribeDetailsReply) {
    option (google.api.http) = {
      get: "/v1/admin/subscribe/details"
    };
  }

  // GetSubscribeList 获取订阅套餐列表
  rpc GetSubscribeList (GetSubscribeListRequest) returns (GetSubscribeListReply) {
    option (google.api.http) = {
      get: "/v1/admin/subscribe/list"
    };
  }

  // SubscribeSort 订阅套餐排序
  rpc SubscribeSort (SubscribeSortRequest) returns (SubscribeSortReply) {
    option (google.api.http) = {
      post: "/v1/admin/subscribe/sort"
      body: "*"
    };
  }

  // CreateSubscribeCategory 创建商品分类
  rpc CreateSubscribeCategory (CreateSubscribeCategoryRequest) returns (CreateSubscribeCategoryReply) {
    option (google.api.http) = {
      post: "/v1/admin/subscribe/category"
      body: "*"
    };
  }

  // UpdateSubscribeCategory 更新商品分类
  rpc UpdateSubscribeCategory (UpdateSubscribeCategoryRequest) returns (UpdateSubscribeCategoryReply) {
    option (google.api.http) = {
      put: "/v1/admin/subscribe/category"
      body: "*"
    };
  }

  // DeleteSubscribeCategory 删除商品分类
  rpc DeleteSubscribeCategory (DeleteSubscribeCategoryRequest) returns (DeleteSubscribeCategoryReply) {
    option (google.api.http) = {
      delete: "/v1/admin/subscribe/category"
      body: "*"
    };
  }

  // BatchDeleteSubscribeCategory 批量删除商品分类
  rpc BatchDeleteSubscribeCategory (BatchDeleteSubscribeCategoryRequest) returns (BatchDeleteSubscribeCategoryReply) {
    option (google.api.http) = {
      delete: "/v1/admin/subscribe/category/batch"
      body: "*"
    };
  }

  // GetSubscribeCategoryList 获取商品分类列表
  rpc GetSubscribeCategoryList (GetSubscribeCategoryListRequest) returns (GetSubscribeCategoryListReply) {
    option (google.api.http) = {
      get: "/v1/admin/subscribe/category/list"
    };
  }

  // CreateSubscribeGroup 创建订阅组
  rpc CreateSubscribeGroup (CreateSubscribeGroupRequest) returns (CreateSubscribeGroupReply) {
    option (google.api.http) = {
      post: "/v1/admin/subscribe/group"
      body: "*"
    };
  }

  // UpdateSubscribeGroup 更新订阅组
  rpc UpdateSubscribeGroup (UpdateSubscribeGroupRequest) returns (UpdateSubscribeGroupReply) {
    option (google.api.http) = {
      put: "/v1/admin/subscribe/group"
      body: "*"
    };
  }

  // DeleteSubscribeGroup 删除订阅组
  rpc DeleteSubscribeGroup (DeleteSubscribeGroupRequest) returns (DeleteSubscribeGroupReply) {
    option (google.api.http) = {
      delete: "/v1/admin/subscribe/group"
      body: "*"
    };
  }

  // BatchDeleteSubscribeGroup 批量删除订阅组
  rpc BatchDeleteSubscribeGroup (BatchDeleteSubscribeGroupRequest) returns (BatchDeleteSubscribeGroupReply) {
    option (google.api.http) = {
      delete: "/v1/admin/subscribe/group/batch"
      body: "*"
    };
  }

  // GetSubscribeGroupList 获取订阅组列表
  rpc GetSubscribeGroupList (GetSubscribeGroupListRequest) returns (GetSubscribeGroupListReply) {
    option (google.api.http) = {
      get: "/v1/admin/subscribe/group/list"
    };
  }

  // ResetAllSubscribeToken 重置所有订阅Token
  rpc ResetAllSubscribeToken (ResetAllSubscribeTokenRequest) returns (ResetAllSubscribeTokenReply) {
    option (google.api.http) = {
      post: "/v1/admin/subscribe/reset_all_token"
      body: "*"
    };
  }
}

// ==================== Subscribe Messages ====================

// SubscribeDiscount 折扣配置
message SubscribeDiscount {
  int64 quantity = 1;  // 数量(月数)
  int64 discount = 2;  // 折扣
}

// TrafficLimit 流量限制配置
message TrafficLimit {
  string stat_type = 1;    // 统计类型
  int64 stat_value = 2;    // 统计值
  int64 traffic_usage = 3; // 流量用量
  int32 speed_limit = 4;   // 速度限制
}

// SubscribePriceOption 商品价格档位
message SubscribePriceOption {
  int64 id = 1;                  // 价格档位ID
  int64 subscribe_id = 2;        // 订阅套餐ID
  string name = 3;               // 档位名称
  string duration_unit = 4;      // 时长单位: Minute/Hour/Day/Week/Month/Year/NoLimit
  int64 duration_value = 5;      // 时长数值
  int64 price = 6;               // 售价（单位：分）
  int64 original_price = 7;      // 原价（单位：分）
  int32 inventory = 8;           // 库存，-1为不限
  bool show = 9;                 // 是否显示
  bool sell = 10;                // 是否售卖
  bool is_default = 11;          // 是否默认档位
  int32 sort = 12;               // 排序
  int64 created_at = 13;         // 创建时间
  int64 updated_at = 14;         // 更新时间
}

// SubscribeInfo 订阅套餐信息
message SubscribeInfo {
  int64 id = 1;                              // 订阅套餐ID
  string name = 2;                          // 订阅套餐名称
  string language = 3;                      // 语言
  string description = 4;                   // 订阅套餐描述
  int64 unit_price = 5;                     // 单位价格（单位：分）
  string unit_time = 6;                     // 单位时间
  repeated SubscribeDiscount discount = 7;  // 折扣配置
  int64 replacement = 8;                    // 替换
  int32 inventory = 9;                      // 库存
  int64 traffic = 10;                       // 流量（字节）
  int32 speed_limit = 11;                   // 速度限制
  int32 device_limit = 12;                  // 设备数限制
  int32 quota = 13;                         // 配额
  int64 category_id = 29;                   // 商品分类ID
  string category_name = 30;                // 商品分类名称
  repeated int64 nodes = 14;                 // 节点IDs
  repeated string node_tags = 15;           // 节点标签
  repeated int64 node_group_ids = 16;       // 节点组IDs
  int64 node_group_id = 17;                 // 节点组ID
  repeated TrafficLimit traffic_limit = 18; // 流量限制配置
  bool show = 19;                           // 是否在门户页面显示
  bool sell = 20;                           // 是否售卖
  int32 sort = 21;                          // 排序
  int32 deduction_ratio = 22;               // 扣除比例
  bool allow_deduction = 23;                // 允许扣除
  int32 reset_cycle = 24;                   // 重置周期: 0-不重置 1-1号 2-每月 3-每年
  bool renewal_reset = 25;                  // 续费重置
  bool show_original_price = 26;            // 显示原价
  int64 created_at = 27;                    // 创建时间
  int64 updated_at = 28;                    // 更新时间
  repeated SubscribePriceOption price_options = 31; // 商品价格档位
}

// SubscribeItem 订阅套餐列表项（包含销量）
message SubscribeItem {
  int64 id = 1;
  string name = 2;
  string language = 3;
  string description = 4;
  int64 unit_price = 5;
  string unit_time = 6;
  repeated SubscribeDiscount discount = 7;
  int64 replacement = 8;
  int32 inventory = 9;
  int64 traffic = 10;
  int32 speed_limit = 11;
  int32 device_limit = 12;
  int32 quota = 13;
  int64 category_id = 30;
  string category_name = 31;
  repeated int64 nodes = 14;
  repeated string node_tags = 15;
  repeated int64 node_group_ids = 16;
  int64 node_group_id = 17;
  repeated TrafficLimit traffic_limit = 18;
  bool show = 19;
  bool sell = 20;
  int32 sort = 21;
  int32 deduction_ratio = 22;
  bool allow_deduction = 23;
  int32 reset_cycle = 24;
  bool renewal_reset = 25;
  bool show_original_price = 26;
  int64 created_at = 27;
  int64 updated_at = 28;
  int64 sold = 29;  // 销量
  repeated SubscribePriceOption price_options = 32; // 商品价格档位
}

// CreateSubscribeRequest 创建订阅套餐请求
message CreateSubscribeRequest {
  string name = 1;                          // 订阅套餐名称
  string language = 2;                      // 语言
  string description = 3;                   // 订阅套餐描述
  int64 unit_price = 4;                     // 单位价格（单位：分）
  string unit_time = 5;                     // 单位时间
  repeated SubscribeDiscount discount = 6;  // 折扣配置
  int64 replacement = 7;                    // 替换
  int32 inventory = 8;                      // 库存
  int64 traffic = 9;                        // 流量（字节）
  int32 speed_limit = 10;                   // 速度限制
  int32 device_limit = 11;                  // 设备数限制
  int32 quota = 12;                         // 配额
  int64 category_id = 27;                   // 商品分类ID
  repeated int64 nodes = 13;                 // 节点IDs
  repeated string node_tags = 14;           // 节点标签
  repeated int64 node_group_ids = 15;       // 节点组IDs
  int64 node_group_id = 16;                 // 节点组ID
  repeated TrafficLimit traffic_limit = 17; // 流量限制配置
  optional bool show = 18;                  // 是否在门户页面显示
  optional bool sell = 19;                  // 是否售卖
  int32 sort = 20;                          // 排序
  int32 deduction_ratio = 21;               // 扣除比例
  optional bool allow_deduction = 22;       // 允许扣除
  int32 reset_cycle = 23;                   // 重置周期
  optional bool renewal_reset = 24;         // 续费重置
  bool show_original_price = 25;            // 显示原价
  bool auto_create_group = 26;              // 自动创建分组
  repeated SubscribePriceOption price_options = 28; // 商品价格档位
}

// CreateSubscribeData 创建订阅套餐数据
message CreateSubscribeData {
  bool success = 1;
}

// CreateSubscribeReply 创建订阅套餐响应
message CreateSubscribeReply {
  int32 code = 1;                  // 状态码
  string message = 2;              // 消息内容
  CreateSubscribeData data = 3;    // 响应数据
}

// UpdateSubscribeRequest 更新订阅套餐请求
message UpdateSubscribeRequest {
  int64 id = 1;                              // 订阅套餐ID
  string name = 2;                          // 订阅套餐名称
  string language = 3;                      // 语言
  string description = 4;                   // 订阅套餐描述
  int64 unit_price = 5;                     // 单位价格（单位：分）
  string unit_time = 6;                     // 单位时间
  repeated SubscribeDiscount discount = 7;  // 折扣配置
  int64 replacement = 8;                    // 替换
  int32 inventory = 9;                      // 库存
  int64 traffic = 10;                       // 流量（字节）
  int32 speed_limit = 11;                   // 速度限制
  int32 device_limit = 12;                  // 设备数限制
  int32 quota = 13;                         // 配额
  int64 category_id = 27;                   // 商品分类ID
  repeated int64 nodes = 14;                 // 节点IDs
  repeated string node_tags = 15;           // 节点标签
  repeated int64 node_group_ids = 16;       // 节点组IDs
  int64 node_group_id = 17;                 // 节点组ID
  repeated TrafficLimit traffic_limit = 18; // 流量限制配置
  optional bool show = 19;                  // 是否在门户页面显示
  optional bool sell = 20;                  // 是否售卖
  int32 sort = 21;                          // 排序
  int32 deduction_ratio = 22;               // 扣除比例
  optional bool allow_deduction = 23;       // 允许扣除
  int32 reset_cycle = 24;                   // 重置周期
  optional bool renewal_reset = 25;         // 续费重置
  bool show_original_price = 26;            // 显示原价
  repeated SubscribePriceOption price_options = 28; // 商品价格档位
}

// UpdateSubscribeData 更新订阅套餐数据
message UpdateSubscribeData {
  bool success = 1;
}

// UpdateSubscribeReply 更新订阅套餐响应
message UpdateSubscribeReply {
  int32 code = 1;                  // 状态码
  string message = 2;              // 消息内容
  UpdateSubscribeData data = 3;    // 响应数据
}

// DeleteSubscribeRequest 删除订阅套餐请求
message DeleteSubscribeRequest {
  int64 id = 1;  // 订阅套餐ID
}

// DeleteSubscribeData 删除订阅套餐数据
message DeleteSubscribeData {
  bool success = 1;
}

// DeleteSubscribeReply 删除订阅套餐响应
message DeleteSubscribeReply {
  int32 code = 1;                  // 状态码
  string message = 2;              // 消息内容
  DeleteSubscribeData data = 3;    // 响应数据
}

// BatchDeleteSubscribeRequest 批量删除订阅套餐请求
message BatchDeleteSubscribeRequest {
  repeated int64 ids = 1;  // 订阅套餐ID列表
}

// BatchDeleteSubscribeData 批量删除订阅套餐数据
message BatchDeleteSubscribeData {
  bool success = 1;
}

// BatchDeleteSubscribeReply 批量删除订阅套餐响应
message BatchDeleteSubscribeReply {
  int32 code = 1;                      // 状态码
  string message = 2;                  // 消息内容
  BatchDeleteSubscribeData data = 3;   // 响应数据
}

// GetSubscribeDetailsRequest 获取订阅套餐详情请求
message GetSubscribeDetailsRequest {
  int64 id = 1;  // 订阅套餐ID
}

// GetSubscribeDetailsData 获取订阅套餐详情数据
message GetSubscribeDetailsData {
  SubscribeInfo subscribe = 1;  // 订阅套餐信息
}

// GetSubscribeDetailsReply 获取订阅套餐详情响应
message GetSubscribeDetailsReply {
  int32 code = 1;                      // 状态码
  string message = 2;                  // 消息内容
  GetSubscribeDetailsData data = 3;    // 响应数据
}

// GetSubscribeListRequest 获取订阅套餐列表请求
message GetSubscribeListRequest {
  int64 page = 1;          // 页码
  int64 size = 2;          // 每页数量
  string language = 3;     // 语言筛选
  string search = 4;       // 搜索关键词
  int64 node_group_id = 5; // 节点组ID筛选
  int64 category_id = 6;   // 商品分类ID筛选
}

// GetSubscribeListData 获取订阅套餐列表数据
message GetSubscribeListData {
  repeated SubscribeItem list = 1;  // 订阅套餐列表
  int32 total = 2;                   // 总数
}

// GetSubscribeListReply 获取订阅套餐列表响应
message GetSubscribeListReply {
  int32 code = 1;                    // 状态码
  string message = 2;                // 消息内容
  GetSubscribeListData data = 3;     // 响应数据
}

// SortItem 排序项
message SortItem {
  int64 id = 1;     // 订阅套餐ID
  int32 sort = 2;  // 排序值
}

// SubscribeSortRequest 订阅套餐排序请求
message SubscribeSortRequest {
  repeated SortItem sort = 1;  // 排序列表
}

// SubscribeSortData 订阅套餐排序数据
message SubscribeSortData {
  bool success = 1;
}

// SubscribeSortReply 订阅套餐排序响应
message SubscribeSortReply {
  int32 code = 1;                // 状态码
  string message = 2;            // 消息内容
  SubscribeSortData data = 3;    // 响应数据
}

// ==================== SubscribeCategory Messages ====================

// SubscribeCategoryInfo 商品分类信息
message SubscribeCategoryInfo {
  int64 id = 1;             // 商品分类ID
  int64 parent_id = 2;      // 父分类ID
  string name = 3;          // 分类名称
  string description = 4;   // 分类描述
  string language = 5;      // 语言
  bool show = 6;            // 是否显示
  int32 sort = 7;           // 排序
  int64 created_at = 8;     // 创建时间
  int64 updated_at = 9;     // 更新时间
}

// CreateSubscribeCategoryRequest 创建商品分类请求
message CreateSubscribeCategoryRequest {
  int64 parent_id = 1;      // 父分类ID
  string name = 2;          // 分类名称
  string description = 3;   // 分类描述
  string language = 4;      // 语言
  optional bool show = 5;   // 是否显示
  int32 sort = 6;           // 排序
}

message CreateSubscribeCategoryData {
  bool success = 1;
}

message CreateSubscribeCategoryReply {
  int32 code = 1;
  string message = 2;
  CreateSubscribeCategoryData data = 3;
}

// UpdateSubscribeCategoryRequest 更新商品分类请求
message UpdateSubscribeCategoryRequest {
  int64 id = 1;             // 商品分类ID
  int64 parent_id = 2;      // 父分类ID
  string name = 3;          // 分类名称
  string description = 4;   // 分类描述
  string language = 5;      // 语言
  optional bool show = 6;   // 是否显示
  int32 sort = 7;           // 排序
}

message UpdateSubscribeCategoryData {
  bool success = 1;
}

message UpdateSubscribeCategoryReply {
  int32 code = 1;
  string message = 2;
  UpdateSubscribeCategoryData data = 3;
}

message DeleteSubscribeCategoryRequest {
  int64 id = 1;  // 商品分类ID
}

message DeleteSubscribeCategoryData {
  bool success = 1;
}

message DeleteSubscribeCategoryReply {
  int32 code = 1;
  string message = 2;
  DeleteSubscribeCategoryData data = 3;
}

message BatchDeleteSubscribeCategoryRequest {
  repeated int64 ids = 1;  // 商品分类ID列表
}

message BatchDeleteSubscribeCategoryData {
  bool success = 1;
}

message BatchDeleteSubscribeCategoryReply {
  int32 code = 1;
  string message = 2;
  BatchDeleteSubscribeCategoryData data = 3;
}

message GetSubscribeCategoryListRequest {
  string language = 1;       // 语言筛选
  optional int64 parent_id = 2; // 父分类筛选，传0可筛选根分类
  optional bool show = 3;    // 显示状态筛选
}

message GetSubscribeCategoryListData {
  repeated SubscribeCategoryInfo list = 1;  // 商品分类列表
  int32 total = 2;                          // 总数
}

message GetSubscribeCategoryListReply {
  int32 code = 1;
  string message = 2;
  GetSubscribeCategoryListData data = 3;
}

// ==================== SubscribeGroup Messages ====================

// SubscribeGroupInfo 订阅组信息
message SubscribeGroupInfo {
  int64 id = 1;                       // 订阅组ID
  string name = 2;                    // 订阅组名称
  string description = 3;             // 订阅组描述
  bool is_expired_group = 4;          // 是否为过期组
  int32 expired_days_limit = 5;       // 过期天数限制
  int32 max_traffic_gb_expired = 6;   // 过期后最大流量GB
  int32 speed_limit = 7;              // 速度限制
  int64 created_at = 8;               // 创建时间
  int64 updated_at = 9;               // 更新时间
}

// CreateSubscribeGroupRequest 创建订阅组请求
message CreateSubscribeGroupRequest {
  string name = 1;                    // 订阅组名称
  string description = 2;             // 订阅组描述
  bool is_expired_group = 3;          // 是否为过期组
  int64 expired_days_limit = 4;       // 过期天数限制
  int64 max_traffic_gb_expired = 5;   // 过期后最大流量GB
  int32 speed_limit = 6;              // 速度限制
}

// CreateSubscribeGroupData 创建订阅组数据
message CreateSubscribeGroupData {
  bool success = 1;
}

// CreateSubscribeGroupReply 创建订阅组响应
message CreateSubscribeGroupReply {
  int32 code = 1;                     // 状态码
  string message = 2;                 // 消息内容
